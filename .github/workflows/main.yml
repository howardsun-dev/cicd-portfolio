name: Deploy Portfolio to AWS S3

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Build React + Vite app
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dist
          path: dist

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync ./dist s3://${{ secrets.AWS_S3_BUCKET }} --delete

          # HTML entrypoints must not be cached by S3/CloudFront, otherwise clients can keep
          # loading an old JS bundle after a deploy.
          aws s3 cp ./dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html \
            --content-type text/html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE
          aws s3 cp ./dist/404.html s3://${{ secrets.AWS_S3_BUCKET }}/404.html \
            --content-type text/html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE

          # Extensionless SPA route objects fix direct navigation through S3/CloudFront.
          aws s3 cp ./dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/project \
            --content-type text/html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE
          aws s3 cp ./dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/techstack \
            --content-type text/html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE
          aws s3 cp ./dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/contact \
            --content-type text/html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        if: github.event_name == 'push' && vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
